@if (isRoomRoute() || isAdminLogin()) {
  <!-- Full-screen views (Room / Admin Login): no chrome -->
  <main class="h-screen w-screen overflow-hidden">
     <app-toast/>
     <router-outlet></router-outlet>
  </main>
} @else {
  <div class="flex flex-col min-h-screen bg-stone-50" [class.admin-shell]="isAdminRoute()">

    @if (isAdminRoute()) {
      <app-admin-navbar></app-admin-navbar>
    } @else {
      <app-navbar></app-navbar>
    }

    <main class="flex-1">
      <app-toast/>
      <router-outlet></router-outlet>
    </main>

    @if (isAdminRoute()) {
      <app-admin-footer></app-admin-footer>
    } @else {
      <app-footer></app-footer>
    }

  </div>
}
