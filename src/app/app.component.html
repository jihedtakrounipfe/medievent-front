@if (isRoomRoute()) {
  <!-- Virtual room: full-screen, no chrome -->
  <router-outlet></router-outlet>
} @else {
  <div class="flex flex-col min-h-screen bg-stone-50" [class.admin-shell]="isAdminRoute()">

    @if (isAdminRoute()) {
      <app-admin-navbar></app-admin-navbar>
    } @else {
      <app-navbar></app-navbar>
    }

    <main class="flex-1">
      <app-toast/>
      <router-outlet></router-outlet>
    </main>

    @if (isAdminRoute()) {
      <app-admin-footer></app-admin-footer>
    } @else {
      <app-footer></app-footer>
    }

  </div>
}
