<!-- ============================================================
     ADMIN LAYOUT: top topbar + left sidebar
     ============================================================ -->

<!-- ── Top Topbar ─────────────────────────────────────────────── -->
<header class="admin-topbar">

  <!-- Left: Logo + toggle -->
  <div class="topbar-left">
    <button class="sidebar-toggle" (click)="toggleSidebar()" title="Réduire le menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a routerLink="/admin/dashboard" class="admin-logo">
      <div class="admin-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"
                fill="white" opacity=".4"/>
          <path d="M13 7h-2v4H7v2h4v4h2v-4h4v-2h-4V7z" fill="white"/>
        </svg>
      </div>
      <div class="admin-logo-text">
        <span class="text-teal-700">Medi</span><span class="text-stone-900">Connect</span>
        <span class="admin-badge-label">ADMIN</span>
      </div>
    </a>
  </div>

  <!-- Center: Search -->
  <div class="topbar-search">
    <div class="search-wrapper">
      <svg class="search-icon w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
      </svg>
      <input type="search" placeholder="Rechercher un utilisateur, ticket..." class="search-input"/>
      <span class="search-shortcut">⌘K</span>
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="topbar-right">

    <!-- System Alerts -->
    <div class="relative" id="admin-notif-btn" (click)="toggleNotifs(); $event.stopPropagation()">
      <button class="topbar-icon-btn" [class.active]="isNotifsOpen">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <span *ngIf="alertCount > 0" class="alert-badge">{{ alertCount }}</span>
      </button>

      <div *ngIf="isNotifsOpen" class="admin-dropdown">
        <div class="admin-dropdown-header">
          <span class="font-semibold text-sm">Alertes système</span>
          <span class="text-xs text-stone-500">{{ alertCount }} actives</span>
        </div>
        <div>
          <div *ngFor="let a of systemAlerts" class="admin-alert-item" [ngClass]="'alert-' + a.type">
            <span>{{ a.icon }}</span>
            <div class="flex-1 min-w-0">
              <p class="text-sm text-stone-800 leading-snug">{{ a.text }}</p>
              <p class="text-xs text-stone-500 mt-0.5">{{ a.time }}</p>
            </div>
          </div>
        </div>
        <div class="admin-dropdown-footer">
          <a routerLink="/admin/users" class="text-xs text-teal-700 hover:text-teal-800 font-semibold">
            Voir tous les logs
          </a>
        </div>
      </div>
    </div>

    <!-- View live site -->
    <a routerLink="/" target="_blank" class="topbar-icon-btn" title="Voir le site">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </svg>
    </a>

    <!-- Admin user -->
    <ng-container *ngIf="user$ | async as user; else guestAdmin">
      <div class="relative" id="admin-user-btn" (click)="toggleUserMenu(); $event.stopPropagation()">
        <button class="admin-user-btn" [class.active]="isUserMenuOpen">
          <div class="admin-avatar">{{ initials(user) }}</div>
          <div class="admin-user-info hidden lg:block">
            <p class="text-sm font-semibold text-stone-900 leading-none">{{ displayName(user) }}</p>
            <p class="text-xs text-stone-500 mt-0.5">ADMIN</p>
          </div>
          <svg class="w-4 h-4 text-stone-400 hidden lg:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <div *ngIf="isUserMenuOpen" class="admin-dropdown admin-user-dropdown">
          <div class="admin-dropdown-header">
            <div class="admin-avatar-lg">{{ initials(user) }}</div>
            <div>
              <p class="text-sm font-semibold text-stone-900">{{ displayName(user) }}</p>
              <p class="text-xs text-stone-500">{{ user.email }}</p>
            </div>
          </div>
          <hr class="border-stone-200 my-1"/>
          <nav>
            <a routerLink="/profile" class="admin-user-nav-item">👤  Mon profil</a>
          </nav>
          <hr class="border-stone-200 my-1"/>
          <button (click)="logout()" class="admin-user-nav-item w-full text-left text-red-600 hover:bg-red-50">
            🚪  Se déconnecter
          </button>
        </div>
      </div>
    </ng-container>
    <ng-template #guestAdmin>
      <a routerLink="/auth/login" class="topbar-icon-btn" title="Se connecter">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </a>
    </ng-template>
  </div>
</header>

<!-- ── Sidebar ─────────────────────────────────────────────────── -->
<!-- Mobile overlay -->
<div *ngIf="isMobileOpen"
     class="fixed inset-0 bg-black/50 z-40 md:hidden"
     (click)="closeMobile()"></div>

<aside class="admin-sidebar"
       [class.sidebar-collapsed]="!isSidebarOpen"
       [class.sidebar-mobile-open]="isMobileOpen">

  <nav class="sidebar-nav">
    <div *ngFor="let group of navGroups" class="sidebar-group">
      <p class="sidebar-group-label" *ngIf="isSidebarOpen">{{ group.label }}</p>
      <a *ngFor="let item of group.items"
         [routerLink]="item.path"
         routerLinkActive="sidebar-link-active"
         [routerLinkActiveOptions]="{exact: item.path === '/admin/dashboard'}"
         class="sidebar-link"
         (click)="closeMobile()"
         [title]="!isSidebarOpen ? item.label : ''">
        <span class="sidebar-link-icon">{{ item.icon }}</span>
        <span *ngIf="isSidebarOpen" class="sidebar-link-label">{{ item.label }}</span>
        <span *ngIf="item.badge && isSidebarOpen" class="sidebar-badge">{{ item.badge }}</span>
      </a>
    </div>
  </nav>

  <!-- Sidebar footer -->
  <div *ngIf="isSidebarOpen" class="sidebar-footer">
    <div class="sidebar-env-badge">
      <span class="env-dot"></span>
      <span class="text-xs text-slate-400">Production</span>
    </div>
    <p class="text-xs text-slate-600 mt-1">MediConnect v1.1</p>
  </div>
</aside>
